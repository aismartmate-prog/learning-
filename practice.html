<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תרגול - המרכז להישגים לימודיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a; --accent-gold: #b09151; --bg-color: #f8fafc;
            --surface-color: #ffffff; --text-main: #334155; --border-light: #e2e8f0;
        }

        body { font-family: 'Heebo', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; height: 100vh; overflow: hidden; }

        header { background: var(--surface-color); padding: 15px 30px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 800; color: var(--primary-blue); }
        .nav-back { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }

        .practice-layout { display: flex; gap: 20px; max-width: 1100px; margin: 20px auto; padding: 0 20px; height: calc(100vh - 90px); }

        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 10px; }
        .btn-side { 
            width: 100%; padding: 12px; border: 1px solid var(--border-light); border-radius: 10px; 
            background: #fff; font-family: 'Heebo'; cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 0.95rem; font-weight: 600; transition: 0.2s;
        }
        .btn-side:hover:not(:disabled) { border-color: var(--accent-gold); background: #fdfbf7; }

        .main-content { 
            flex: 1; background: var(--surface-color); border-radius: 16px; padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-light);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        
        .question-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; color: var(--primary-blue); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn-option { 
            background: #fff; border: 1px solid var(--border-light); padding: 20px; border-radius: 12px; 
            font-size: 1.05rem; cursor: pointer; transition: 0.2s; text-align: right;
        }
        .btn-option:hover:not(:disabled) { border-color: var(--accent-gold); background: #fdfbf7; }

        .opt-correct { border-color: #059669 !important; background: #ecfdf5 !important; }
        .opt-wrong { border-color: #dc2626 !important; background: #fef2f2 !important; }

        .info-box { display: none; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 2px solid; font-size: 1rem; line-height: 1.7; }
        .hint-box { background: #fffbeb; border-color: #f59e0b; color: #92400e; }
        .solution-box { background: #ecfdf5; border-color: #10b981; color: #065f46; }
        .box-title { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; }

        .btn-next-main { 
            background: var(--primary-blue); color: white; display: none; padding: 14px 30px; 
            border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 10px; align-self: flex-start;
        }
    </style>
</head>
<body>

<header>
    <h1 id="header-title">תרגול</h1>
    <a href="javascript:history.back()" class="nav-back">חזרה ↩</a>
</header>

<div class="practice-layout">
    <aside class="sidebar">
        <button class="btn-side" onclick="toggleBox('hint-box')">💡 רמז</button>
        <button class="btn-side" onclick="toggleBox('solution-box')">📘 פתרון מלא</button>
        <hr style="width:100%; border:0; border-top:1px solid #eee;">
        <button class="btn-side" id="btn-next-side" onclick="nextQuestion()">➡️ שאלה הבאה</button>
        <button class="btn-side" id="btn-prev" onclick="prevQuestion()" disabled>⬅️ שאלה קודמת</button>
        <hr style="width:100%; border:0; border-top:1px solid #eee;">
        <button class="btn-side" onclick="goBackToActivity()">🔄 החלף פעילות</button>
        <button class="btn-side" onclick="window.location.href='index.html'">📚 החלף מקצוע</button>
    </aside>

    <main class="main-content" id="quiz-screen">
        <div style="font-weight: 700; margin-bottom: 20px; color: #64748b;">שאלה <span id="current-q-num">1</span></div>
        <div class="question-title" id="q-text">טוען שאלה...</div>
        <div class="options-grid" id="q-options"></div>
        
        <div id="hint-box" class="info-box hint-box">
            <div class="box-title">💡 רמז</div>
            <span id="hint-content"></span>
        </div>
        <div id="solution-box" class="info-box solution-box">
            <div class="box-title">📘 פתרון מלא</div>
            <div id="solution-content" style="white-space: pre-wrap;"></div>
        </div>
        
        <button id="btn-next-main" class="btn-next-main" onclick="nextQuestion()">המשך לשאלה הבאה</button>
    </main>
</div>

<script>
    let filteredQuestions = [], currentIndex = 0, userAnswers = [], returnUrl = 'index.html';

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const grade = urlParams.get('grade'), topic = urlParams.get('topic'), subtopic = urlParams.get('subtopic'), activity = urlParams.get('activity');
        
        console.log("נתונים מה-URL:", { grade, topic, subtopic }); // לבדיקה ב-Console

        if (!grade || !topic) { window.location.href = 'index.html'; return; }
        
        document.getElementById('header-title').innerText = `תרגול | כיתה ${grade} | ${subtopic || topic}`;
        returnUrl = `math.html?grade=${encodeURIComponent(grade)}`;

        let gradeCode = grade;
        if (grade === "ה-ו") gradeCode = "5_6";
        else if (grade === "ז") gradeCode = "7";
        else if (grade === "ח") gradeCode = "8";
        else if (grade === "ט") gradeCode = "9";

        const scriptPath = `data/${gradeCode}_${topic}.js`;
        console.log("מנסה לטעון קובץ בנתיב:", scriptPath); // לבדיקה

        const script = document.createElement('script');
        script.src = scriptPath;
        
        script.onload = function() {
            console.log("הקובץ נטען בהצלחה!");
            if (typeof questionsDB !== 'undefined') {
                filteredQuestions = questionsDB.filter(q => (!subtopic || q.subTopic === subtopic));
                
                if (filteredQuestions.length === 0) { 
                    alert("לא נמצאו שאלות לתת-הנושא: " + subtopic); 
                    window.location.href = returnUrl; 
                    return; 
                }
                
                for (let i = filteredQuestions.length - 1; i > 0; i--) { 
                    const j = Math.floor(Math.random() * (i + 1)); 
                    [filteredQuestions[i], filteredQuestions[j]] = [filteredQuestions[j], filteredQuestions[i]]; 
                }
                userAnswers = new Array(filteredQuestions.length).fill(null);
                loadQuestion();
            } else {
                console.error("המערך questionsDB לא הוגדר בקובץ ה-JS.");
            }
        };

        script.onerror = function() {
            alert(`שגיאה: הקובץ ${scriptPath} חסר בתיקיית data.`);
            window.location.href = returnUrl;
        };

        document.head.appendChild(script);
    };

    function loadQuestion() {
        const q = filteredQuestions[currentIndex];
        document.getElementById('current-q-num').innerText = currentIndex + 1;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('hint-content').innerText = q.hint || "אין רמז.";
        document.getElementById('solution-content').innerText = q.solution || "אין פתרון.";
        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('solution-box').style.display = 'none';
        document.getElementById('btn-next-main').style.display = 'none';
        document.getElementById('btn-prev').disabled = (currentIndex === 0);
        
        const optionsBox = document.getElementById('q-options');
        optionsBox.innerHTML = '';
        q.options.forEach((optText, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = optText;
            if (userAnswers[currentIndex] !== null) {
                btn.disabled = true;
                if (index === q.correctAnswer) btn.classList.add('opt-correct');
                else if (index === userAnswers[currentIndex]) btn.classList.add('opt-wrong');
            } else {
                btn.onclick = () => {
                    userAnswers[currentIndex] = index;
                    document.querySelectorAll('.btn-option').forEach(b => b.disabled = true);
                    if(index === q.correctAnswer) btn.classList.add('opt-correct');
                    else { btn.classList.add('opt-wrong'); document.querySelectorAll('.btn-option')[q.correctAnswer].classList.add('opt-correct'); }
                    document.getElementById('btn-next-main').style.display = 'block';
                };
            }
            optionsBox.appendChild(btn);
        });
        if (userAnswers[currentIndex] !== null) document.getElementById('btn-next-main').style.display = 'block';
    }

    function nextQuestion() {
        if (currentIndex < filteredQuestions.length - 1) { currentIndex++; loadQuestion(); } 
        else { alert("כל הכבוד! סיימת את כל השאלות בנושא זה."); }
    }
    function prevQuestion() { if (currentIndex > 0) { currentIndex--; loadQuestion(); } }
    function toggleBox(id) { const b = document.getElementById(id); b.style.display = (b.style.display === 'block' ? 'none' : 'block'); }
    function goBackToActivity() { window.location.href = returnUrl; }
</script>
</body>
</html>
