<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המרדף - המרכז להישגים לימודיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* צבעי המערכת המקוריים בשילוב תאורת גיימינג */
            --bg-deep: #020617;
            --bg-panel: #0f172a;
            --bg-card: #1e293b;
            --accent-gold: #c5a059;
            --accent-gold-glow: rgba(197, 160, 89, 0.6);
            --player-color: #38bdf8;
            --player-glow: rgba(56, 189, 248, 0.6);
            --chaser-red: #ef4444;
            --chaser-glow: rgba(239, 68, 68, 0.6);
            --success-green: #10b981;
            --success-glow: rgba(16, 185, 129, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-soft: rgba(255,255,255,0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Heebo', sans-serif; }

        body { 
            margin: 0; 
            padding: 0;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text-main); 
            height: 100vh; /* מונע גלילה - גובה מסך מלא מדויק */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* חוסם גלילה חיצונית לחלוטין */
        }

        /* --- הדר (קומפקטי ויוקרתי) --- */
        header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px);
            padding: 0 15px; 
            border-bottom: 1px solid var(--accent-gold); 
            display: flex; justify-content: space-between; align-items: center; 
            height: 50px; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold-glow); display: flex; align-items: center; gap: 8px;}
        .back-btn { color: var(--text-muted); text-decoration: none; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: 0.2s; display: flex; align-items: center; gap: 5px;}
        .back-btn:hover { color: var(--accent-gold); }

        /* --- מעטפת ראשית (ממלאת את המסך, מסדרת אלמנטים בגריד/פלקס) --- */
        .chase-container { 
            display: flex; flex-direction: column; 
            width: 100%; max-width: 900px; 
            margin: 0 auto; padding: 10px; 
            flex: 1; position: relative; 
            overflow: hidden;
        }

        /* --- מסך פתיחה --- */
        .overlay-screen { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 16px; padding: 25px; 
            text-align: center; border: 1px solid var(--accent-gold); 
            max-width: 450px; width: 100%; margin: auto; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7), inset 0 0 20px var(--accent-gold-glow);
        }
        .overlay-title { font-size: 2.2rem; color: var(--accent-gold); margin-bottom: 5px; font-weight: 900; text-shadow: 0 0 15px var(--accent-gold-glow);}
        .overlay-subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 20px; font-weight: 600;}
        
        .rules-box {
            text-align: right; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; border: 1px solid var(--border-soft); font-size: 0.85rem; line-height: 1.5; color: #cbd5e1;
        }
        .rules-box strong { color: var(--accent-gold); }

        .players-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .player-input-group { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .player-input-group label { font-size: 0.8rem; font-weight: 700; color: var(--text-main); }
        .player-input-group input { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-soft); 
            background: #020617; color: white; font-size: 0.95rem; outline: none; transition: 0.3s; font-weight: bold;
        }
        .player-input-group.p1 input:focus { border-color: var(--player-color); box-shadow: 0 0 8px var(--player-glow);}
        .player-input-group.p2 input:focus { border-color: var(--chaser-red); box-shadow: 0 0 8px var(--chaser-glow);}

        .btn-action { 
            background: linear-gradient(to right, #c5a059, #b08d4a); 
            color: #000; border: none; padding: 12px 20px; font-size: 1.1rem; font-weight: 900; 
            border-radius: 12px; cursor: pointer; transition: 0.2s; 
            box-shadow: 0 6px 15px var(--accent-gold-glow); width: 100%;
        }
        .btn-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-gold-glow); filter: brightness(1.1);}
        .btn-action:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }

        /* --- מסך משחק (חלוקה חכמה לחלק עליון ותחתון) --- */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; gap: 10px; }

        /* 1. לוח המסלול (עליון) */
        .board { 
            background: var(--bg-panel); border: 1px solid var(--border-soft); 
            border-radius: 12px; padding: 15px 15px 25px 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0;
            position: relative;
        }
        
        .track { 
            display: flex; justify-content: space-between; align-items: center; 
            position: relative; 
        }
        .track::before { 
            content: ''; position: absolute; top: 50%; left: 10px; right: 10px; 
            height: 4px; background: linear-gradient(90deg, var(--chaser-red) 0%, #334155 50%, var(--success-green) 100%); 
            z-index: 1; transform: translateY(-50%); border-radius: 4px;
        }

        .step { 
            width: 25px; height: 25px; background: var(--bg-deep); 
            border: 2px solid var(--text-muted); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 2; position: relative; transition: 0.4s; 
        }
        .step.start { border-color: var(--chaser-red); box-shadow: 0 0 10px var(--chaser-glow); }
        .step.bank { 
            width: 35px; height: 35px; border-color: var(--success-green); 
            background: rgba(16,185,129,0.2); box-shadow: 0 0 15px var(--success-glow); 
            font-size: 1.2rem; color: var(--success-green);
        }

        /* סמלי השחקנים */
        .token { 
            position: absolute; display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 10; 
        }
        .token-player { top: -25px; }
        .token-chaser { bottom: -25px; }
        
        .token-icon { font-size: 1.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .token-player .token-icon { color: var(--player-color); text-shadow: 0 0 10px var(--player-glow); animation: bounce 1.5s infinite alternate;}
        .token-chaser .token-icon { color: var(--chaser-red); text-shadow: 0 0 10px var(--chaser-glow); font-size: 1.7rem; animation: pulseRed 2s infinite;}

        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
        @keyframes pulseRed { 0% { filter: drop-shadow(0 0 5px var(--chaser-red)); } 50% { filter: drop-shadow(0 0 15px var(--chaser-red)); } 100% { filter: drop-shadow(0 0 5px var(--chaser-red)); } }

        /* 2. גלגלי הצלה (שורה צרה) */
        .lifelines { display: flex; justify-content: center; gap: 10px; flex-shrink: 0; }
        .lifeline-btn { 
            background: linear-gradient(180deg, var(--bg-card), var(--bg-panel));
            border: 1px solid var(--border-soft); color: var(--text-main); 
            padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; font-size: 0.85rem; 
            transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex: 1; justify-content: center;
        }
        .lifeline-btn i { color: var(--accent-gold); font-size: 1rem;}
        .lifeline-btn:hover:not(:disabled) { border-color: var(--accent-gold); background: rgba(197, 160, 89, 0.1); transform: translateY(-2px);}
        .lifeline-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); transform: scale(0.95); }

        /* 3. קופסת שאלות וכפתורים (תופסת את שאר המקום) */
        .question-box { 
            background: var(--bg-panel); border-radius: 12px; padding: 15px; 
            border: 1px solid var(--border-soft); box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
        }
        
        .tools-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; flex-shrink: 0;}
        .btn-tool { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; transition: 0.2s;}
        .btn-tool:hover { border-color: var(--player-color); color: var(--text-main); background: var(--player-glow);}

        #hint-display { display: none; background: rgba(197, 160, 89, 0.1); border: 1px dashed var(--accent-gold); color: var(--accent-gold); padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 10px; font-weight: 700; text-align: center; flex-shrink: 0; }

        .question-text-wrapper { 
            margin-bottom: 10px; padding: 10px 15px; 
            background: var(--bg-deep); border-radius: 10px; 
            border-right: 4px solid var(--accent-gold);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            flex-shrink: 0; max-height: 25vh; overflow-y: auto; scrollbar-width: none;
        }
        .question-text { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.4; text-align: center; }
        .question-text img, .question-text svg { max-width: 100%; max-height: 120px; display: block; margin: 10px auto; border-radius: 6px; }
        
        /* Math */
        .math-bdi { display: inline-block; direction: ltr; unicode-bidi: isolate; margin: 0 3px; font-family: monospace; font-size: 1.1em; color: var(--accent-gold); font-weight: bold;}
        .fraction-container { display: inline-flex; flex-direction: column; vertical-align: middle; padding: 0 4px; font-size: 0.8em; direction: ltr; margin: 0 2px;}
        .fraction-numerator { border-bottom: 1.5px solid currentColor; text-align: center; padding: 1px 2px 0 2px; }
        .fraction-denominator { text-align: center; padding: 0 2px 2px 2px; }
        sup { font-size: 0.7em; vertical-align: super; line-height: 0; color: var(--accent-gold);}
        sub { font-size: 0.7em; vertical-align: sub; }

        /* Options */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; align-content: stretch; }
        .option-btn { 
            background: linear-gradient(180deg, #1e293b, #0f172a); 
            border: 2px solid var(--border-soft); 
            color: var(--text-main); 
            padding: 10px; border-radius: 12px; 
            font-size: 1.05rem; font-weight: 700; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); 
            display: flex; align-items: center; justify-content: center; 
            line-height: 1.3; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center;
        }
        .option-btn:hover:not(:disabled):not(.hidden-opt) { 
            border-color: var(--accent-gold); background: rgba(197, 160, 89, 0.1); 
            transform: scale(1.02); box-shadow: 0 6px 15px var(--accent-gold-glow);
        }
        .option-btn:active:not(:disabled):not(.hidden-opt) { transform: scale(0.95); }
        
        .opt-correct { 
            background: linear-gradient(180deg, #059669, #064e3b) !important; 
            border-color: var(--success-green) !important; color: #fff !important; 
            box-shadow: 0 0 20px var(--success-glow) !important; 
            animation: popCorrect 0.5s ease;
        }
        @keyframes popCorrect { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        
        .opt-wrong { 
            background: linear-gradient(180deg, #dc2626, #7f1d1d) !important; 
            border-color: var(--danger-red) !important; color: #fff !important; 
            box-shadow: 0 0 15px var(--chaser-glow) !important; opacity: 0.8;
            animation: shakeWrong 0.4s ease;
        }
        @keyframes shakeWrong { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-5px);} 40%, 80% {transform: translateX(5px);} }
        .hidden-opt { visibility: hidden; opacity: 0; }

        /* Turn Status */
        .turn-status { 
            margin-top: 10px; font-size: 1.1rem; font-weight: 800; height: 25px; 
            color: var(--player-color); text-shadow: 0 0 10px var(--player-glow); 
            text-align: center; flex-shrink: 0; transition: 0.3s;
        }

        /* --- תאימות מובייל מושלמת --- */
        @media (max-width: 600px) { 
            .options-grid { grid-template-columns: 1fr; gap: 8px;} 
            .board { padding: 15px 10px 25px 10px; margin-bottom: 10px;}
            .track { padding: 0; } 
            .step { width: 22px; height: 22px; } 
            .step.bank { width: 30px; height: 30px; font-size: 1rem;} 
            .token-icon { font-size: 1.3rem; }
            .token-player { top: -20px; } 
            .token-chaser { bottom: -20px; } 
            
            .lifelines { gap: 8px; margin-bottom: 10px;} 
            .lifeline-btn { padding: 8px 5px; font-size: 0.8rem; border-radius: 8px;} 
            
            .question-box { padding: 12px; border-radius: 12px; gap: 8px;}
            .question-text-wrapper { padding: 10px; margin-bottom: 5px; max-height: 22vh;}
            .question-text { font-size: 1.1rem; }
            .option-btn { font-size: 1rem; padding: 10px; min-height: 50px; border-radius: 10px;}
            
            .tools-bar { gap: 6px; margin-bottom: 5px; }
            .btn-tool { padding: 4px 8px; font-size: 0.75rem; }
            
            .turn-status { font-size: 1rem; margin-top: 5px; height: 20px;}
            
            .overlay-screen { padding: 20px 15px;}
            .overlay-title { font-size: 2rem; }
            .players-input-area { flex-direction: column; gap: 10px; margin-bottom: 15px;}
            .btn-action { font-size: 1.1rem; padding: 10px;}
        }
    </style>
</head>

<header>
    <h1><i class="fa-solid fa-bolt"></i> המרדף</h1>
    <a onclick="goBackToSelection()" class="back-btn">יציאה <i class="fa-solid fa-arrow-right-from-bracket"></i></a>

<div class="chase-container">

        <div class="rules-box">
            <strong>איך משחקים?</strong><br>
            • אתם מתחילים ביתרון של 3 צעדים.<br>
            • תשובה נכונה = צעד לבנק.<br>
            • הצ'ייסר עונה אחריכם (הוא לא תמיד צודק).<br>
            • <span style="color:var(--chaser-red);">נתפסתם?</span> המשחק נגמר.<br>

            </div>
            <div class="player-input-group p2">
                <label for="p2-name"><i class="fa-solid fa-user-ninja"></i> הצ'ייסר</label>
                <input type="text" id="p2-name" placeholder="הקלידו שם..." value="הצ'ייסר">
            </div>
        </div>
        
        <button class="btn-action" id="start-btn" onclick="startGame()" disabled style="opacity:0.5;"><i class="fa-solid fa-play"></i> התחל משחק</button>
    </div>

    <div id="game-screen">
        
        <div class="board">
            <div class="track" id="track-container"></div>
        </div>

        <div class="lifelines">
            <button class="lifeline-btn" id="ll-5050" onclick="use5050()" title="50:50"><span>50:50</span> <i class="fa-solid fa-scale-balanced"></i></button>
            <button class="lifeline-btn" id="ll-hint" onclick="useHint()" title="רמז"><span>רמז</span> <i class="fa-solid fa-lightbulb"></i></button>
            <button class="lifeline-btn" id="ll-skip" onclick="useSkip()" title="החלף שאלה"><span>החלף</span> <i class="fa-solid fa-forward-step"></i></button>
        </div>

        <div class="question-box" id="question-box">
            <div class="tools-bar" id="tools-bar"></div>
            <div id="hint-display"></div>
            
            <div class="question-text-wrapper">
                <div class="question-text" id="q-text"></div>
            </div>
            
            <div class="options-grid" id="q-options"></div>
            
            <div class="turn-status" id="turn-status">תורכם. בחרו תשובה.</div>
        </div>
    </div>

    <div id="end-screen" class="overlay-screen" style="display: none;">
        <div class="overlay-title" id="end-title"></div>
        <div class="overlay-subtitle" id="end-subtitle" style="margin-bottom: 20px; font-weight: bold; line-height: 1.5; color: white;"></div>
        
        <button class="btn-action" onclick="window.location.reload()" style="margin-bottom: 10px;"><i class="fa-solid fa-rotate-right"></i> משחק חוזר</button>
        <button class="btn-action" style="background: var(--bg-input); color: var(--text-main); box-shadow: none;" onclick="goBackToSelection()"><i class="fa-solid fa-folder-open"></i> נושא אחר</button>
    </div>

</div>

    window.allFetchedQuestions = [];

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        let rawGrade = urlParams.get('grade') || "";
        urlGrade = rawGrade.trim().toLowerCase();
        
        let rawSubject = urlParams.get('subject') || "";
        urlSubject = rawSubject.trim().toLowerCase();
        
        currentTopicStr = urlParams.get('topic') || "";
        currentSubtopic = urlParams.get('subtopic') || "";
        
        isFinanceMode = (urlGrade === "finance" || urlSubject === "finance");
        isEnglishMode = (urlGrade === "english" || urlSubject === "english"); 
        isHebrewMode = (urlGrade === "hebrew" || urlSubject === "hebrew"); 
        isArabicMode = (urlGrade === "arabic" || urlSubject === "arabic"); 
        isMathMode = !(isFinanceMode || isEnglishMode || isHebrewMode || isArabicMode || urlSubject === 'science' || urlGrade === 'science'); 

        let displayTopic = "";
        if (currentTopicStr.toLowerCase().includes('bagrut')) displayTopic = "הכנה לבגרות";
        else if (currentTopicStr === 'abc_basics') displayTopic = "אנגלית מהבסיס";
        else {
            let topicsArray = currentTopicStr.split(',');
            displayTopic = topicsArray.map(t => topicTranslations[t.trim()] || t.trim()).join(', ');
        }
        
        let safeSubtopicDisplay = currentSubtopic ? currentSubtopic.replace(/&#39;/g, "'").replace(/&quot;/g, '"') : '';
        document.getElementById('intro-topic-desc').innerText = `${displayTopic} ${safeSubtopicDisplay ? '| '+safeSubtopicDisplay : ''}`;

        const backMap = { "bar_ilan": "ה-ו", "5_6_bar_ilan": "ה-ו", "grade7": "ז", "grade8": "ח", "grade9": "ט", "5_6": "ה-ו" };
        if (isEnglishMode) returnUrl = 'english.html';
        else if (isFinanceMode) returnUrl = 'finance.html';
        else if (isHebrewMode) returnUrl = 'hebrew.html';
        else if (isArabicMode) returnUrl = 'arabic.html';
        else if (urlSubject === 'science' || urlGrade === 'science') returnUrl = 'science.html';
        else returnUrl = `math.html?grade=${encodeURIComponent(backMap[urlGrade] || urlGrade)}`;

        loadDataFiles();
    };

    function loadDataFiles() {
        let filesToLoad = [];
        let topicsToLoad = currentTopicStr ? currentTopicStr.split(',') : [];
        
        if (urlGrade === "finance" || urlSubject === "finance") {
            topicsToLoad.forEach(t => { filesToLoad.push(`data/finance_${t.trim().replace(/\s+/g, '_')}.js`); });
        } else if (urlGrade === "bar_ilan" || urlGrade === "5_6_bar_ilan") {
            filesToLoad.push(`data/5_6_bar_ilan.js`);
        } else if (topicsToLoad.length > 0) {
            topicsToLoad.forEach(t => {
                let safeTopic = t.trim().replace(/\s+/g, '_');
                
                if (urlGrade === "5_6" || urlGrade === "ה-ו") filesToLoad.push(`data/5_6_${safeTopic}.js`);
                else if (urlGrade === "35172" && safeTopic === "trigo_172") filesToLoad.push(`data/35172_trigonometry_172.js`); 
                else if (isEnglishMode) filesToLoad.push(`data/english_${safeTopic}.js`); 
                else if (isHebrewMode) {
                    if(safeTopic === 'יסודי_כללי') filesToLoad.push(`data/כללי_יסודי_כללי.js`);
                    else filesToLoad.push(`data/hebrew_${safeTopic}.js`);
                } 
                else if (isArabicMode) filesToLoad.push(`data/arabic_${safeTopic}.js`);
                else if (urlSubject === 'science' || urlGrade === 'science') filesToLoad.push(`data/science_${safeTopic}.js`);
                else filesToLoad.push(`data/${urlGrade}_${safeTopic}.js`);
            });
        }

        let currentFileIndex = 0;

        function loadNextScript() {
            if (currentFileIndex >= filesToLoad.length) {
                processLoadedData();
                return;
            }
            const script = document.createElement('script');
            script.src = filesToLoad[currentFileIndex];
            
            script.onload = () => {
                let rawData = [];
                
                const possibleNames = [
                    'readingTextsDB', 'questionsDB', 'questions', 'quizData', 'data',
                    'questionsDB_grammar', 'questionsDB_syntax', 'questionsDB_part2',
                    'questionsDB_advanced', 'questionsDB_part3', 'englishQuestions',
                    'arabicQuestions', 'questionsList', 'qDB', 'questionsData'
                ];
                
                possibleNames.forEach(name => {
                    try {
                        let val = eval(`typeof ${name} !== 'undefined' ? ${name} : undefined`);
                        if (val && Array.isArray(val) && val.length > 0) {
                            rawData = rawData.concat(val);
                        }
                    } catch(e) {}
                });
                
                if (rawData.length > 0) {
                    let seen = new Set(window.allFetchedQuestions.map(q => q.question || q.question_text));
                    rawData.forEach(q => {
                        let text = q.question || q.question_text;
                        if (!seen.has(text)) {
                            window.allFetchedQuestions.push(q);
                            if (text) seen.add(text);
                        }
                    });
                }
                
                currentFileIndex++;
                loadNextScript();
            };
            script.onerror = () => { 
                console.error("קובץ לא נמצא: " + script.src);
                currentFileIndex++; 
                loadNextScript(); 
            };
            document.head.appendChild(script);
        }

        if (filesToLoad.length > 0) loadNextScript();
        else processLoadedData();
    }

    function processLoadedData() {
        let decodedSub = currentSubtopic ? currentSubtopic.replace(/&#39;/g, "'").replace(/&quot;/g, '"') : "";
        const selectedSubs = decodedSub ? decodedSub.split(',') : [];
        
        let rawPool = window.allFetchedQuestions.filter(q => {
            if (selectedSubs.length > 0) {
                const qSub = String(q.subTopic || q.subtopic || "").trim();
                if (!qSub) return true; 
                
                if (isEnglishMode) {
                    return decodedSub.includes(qSub) || qSub.includes(decodedSub.split('(')[0].trim());
                } else {
                    return selectedSubs.some(sub => qSub === sub.trim() || qSub.includes(sub.trim().split('(')[0].trim()));
                }
            }
            return true; 
        });

        let tempPool = [];
        rawPool.forEach(item => {
            if (item.questions && Array.isArray(item.questions)) {
                let passageContent = Array.isArray(item.content) ? item.content.join('\n\n') : item.content;
                item.questions.forEach(innerQ => {
                    let newQ = { ...innerQ };
                    newQ.passage = passageContent || item.passage;
                    tempPool.push(newQ);
                });
            } else {
                tempPool.push(item);
            }
        });

        pool = tempPool.map(q => {
            let normQ = { ...q };
            if (!normQ.options) normQ.options = normQ.answers || normQ.choices || ["תשובה 1", "תשובה 2"];
            if (normQ.correctAnswer === undefined) normQ.correctAnswer = normQ.correct_answer || 0;
            if (!normQ.question) normQ.question = normQ.question_text || normQ.text || normQ.sentence || "שאלה חסרה";
            return normQ;
        });

        pool = pool.sort(() => 0.5 - Math.random());

        const startBtn = document.getElementById('start-btn');
        if(pool.length > 0) {
            startBtn.disabled = false;
            startBtn.style.opacity = 1;
        } else {
            startBtn.innerText = "אין שאלות זמינות";
        }
    }

    function startGame() {
        let n1 = document.getElementById('p1-name').value.trim();
        let n2 = document.getElementById('p2-name').value.trim();
        if(n1) p1Name = n1;
        if(n2) p2Name = n2;

        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        buildTrack();
        nextTurn();
    }

    function buildTrack() {
        const track = document.getElementById('track-container');
        track.innerHTML = '';
        for(let i=0; i<=TOTAL_STEPS; i++) {
            let stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.id = `step-${i}`;
            
            if (i === 0) stepDiv.classList.add('start');
            if (i === TOTAL_STEPS) {
                stepDiv.classList.add('bank');
                stepDiv.innerHTML = '<i class="fa-solid fa-vault"></i>';
            }
            track.appendChild(stepDiv);
        }
        updateTokens();
    }

    function updateTokens() {
        document.querySelectorAll('.token').forEach(e => e.remove());
        
        const pStep = document.getElementById(`step-${playerPos}`);
        if(pStep) {
            let pToken = document.createElement('div');
            pToken.className = 'token token-player';
            pToken.innerHTML = '<div class="token-icon"><i class="fa-solid fa-user"></i></div><div class="token-glow"></div>';
            pStep.appendChild(pToken);
        }

        const cStep = document.getElementById(`step-${chaserPos}`);
        if(cStep) {
            let cToken = document.createElement('div');
            cToken.className = 'token token-chaser';
            cToken.innerHTML = '<div class="token-icon"><i class="fa-solid fa-user-ninja"></i></div><div class="token-glow"></div>';
            cStep.appendChild(cToken);
        }
    }

    function nextTurn() {
        if (pool.length === 0) {
            endGame(false, "נגמרו השאלות! שרדתם, אבל לא הגעתם לבנק.");
            return;
        }
        
        currentQuestion = pool.pop(); 
        currentQuestion.shuffledOptions = shuffleOptions(currentQuestion.options);

        renderQuestion();
    }

    function renderQuestion() {
        const qText = document.getElementById('q-text');
        const qOptions = document.getElementById('q-options');
        const toolsBar = document.getElementById('tools-bar');
        const hintDisplay = document.getElementById('hint-display');
        const turnStatus = document.getElementById('turn-status');
        
        qOptions.innerHTML = '';
        toolsBar.innerHTML = '';
        hintDisplay.style.display = 'none';
        turnStatus.innerHTML = `תור של <span style="color:var(--player-blue); text-shadow:0 0 10px var(--player-blue);">${p1Name}</span>`;

        if (isMathMode) {
            let calcBtn = document.createElement('button');
            calcBtn.className = 'btn-tool';
            calcBtn.innerHTML = '<i class="fa-solid fa-calculator"></i> מחשבון';
            calcBtn.onclick = openCalculatorWindow;
            toolsBar.appendChild(calcBtn);

            let formBtn = document.createElement('button');
            formBtn.className = 'btn-tool';
            formBtn.innerHTML = '<i class="fa-solid fa-square-root-variable"></i> נוסחאות';
            formBtn.onclick = openFormulasWindow;
            toolsBar.appendChild(formBtn);
        }

        let showReadingBtn = false;
        let qTopic = String(currentQuestion.topic || "").toLowerCase();
        let qSub = String(currentQuestion.subTopic || currentQuestion.subtopic || "").toLowerCase();
        
        if (currentQuestion.passage || currentQuestion.reading_text || currentQuestion.content) {
            showReadingBtn = true;
            window.currentPassage = currentQuestion.passage || currentQuestion.reading_text || currentQuestion.content;
        } else if (isEnglishMode && qTopic.includes('reading_comprehension') && !qSub.includes('strategies')) {
            showReadingBtn = true;
        } else if (isHebrewMode && (qTopic.includes('יסודי') || qTopic.includes('הבעה')) && qSub.includes('הבנת הנקרא')) {
            showReadingBtn = true;
        } else if (isArabicMode && qTopic.includes('הבנת הנקרא')) {
            showReadingBtn = true;
        }
        
        if (showReadingBtn) {
            let btn = document.createElement('button');
            btn.className = 'btn-tool';
            btn.innerHTML = '<i class="fa-solid fa-book-open"></i> טקסט קריאה';
            btn.onclick = openReadingWindow;
            toolsBar.appendChild(btn);
        }

        let qDir = isEnglishMode ? "ltr" : "rtl";
        let qAlign = isEnglishMode ? "left" : "center";
        
        let formattedQText = formatContent(currentQuestion.question);
        qText.innerHTML = `<div dir="${qDir}" style="text-align: ${qAlign};">${formattedQText}</div>`;

        (currentQuestion.shuffledOptions || []).forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.id = `opt-${idx}`;
            
            let hasHebrew = containsHebrew(opt.text);
            let optDir = (hasHebrew && !isEnglishMode) ? "rtl" : "ltr";
            
            let formattedOptText = formatContent(opt.text);
            
            btn.innerHTML = `<span dir="${optDir}" style="display:inline-block; width:100%;">${formattedOptText}</span>`;
            
            btn.onclick = () => handleAnswer(opt.originalIndex, btn);
            qOptions.appendChild(btn);
        });
    }

    function handleAnswer(selectedIndex, btnElement) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        
        const isCorrect = (selectedIndex === currentQuestion.correctAnswer);
        const turnStatus = document.getElementById('turn-status');

        if (isCorrect) {
            btnElement.classList.add('opt-correct');
            playSound('correct');
            turnStatus.innerHTML = `נכון! <i class="fa-solid fa-check"></i> מתקדמים.`;
            turnStatus.style.color = "var(--success-green)";
            playerPos++;
        } else {
            btnElement.classList.add('opt-wrong');
            playSound('wrong');
            turnStatus.innerHTML = `טעות <i class="fa-solid fa-xmark"></i> נשארים במקום.`;
            turnStatus.style.color = "var(--danger-red)";
            
            const correctIdx = (currentQuestion.shuffledOptions || []).findIndex(o => o.originalIndex === currentQuestion.correctAnswer);
            if(document.getElementById(`opt-${correctIdx}`)) {
                document.getElementById(`opt-${correctIdx}`).classList.add('opt-correct');
            }
        }

        updateTokens();

        setTimeout(() => {
            chaserTurn();
        }, 1500); 
    }

    function chaserTurn() {
        const turnStatus = document.getElementById('turn-status');
        turnStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${p2Name} חושב...`;
        turnStatus.style.color = "var(--text-muted)";
        
        setTimeout(() => {
            const isChaserCorrect = Math.random() <= chaserAccuracy;
            if (isChaserCorrect) {
                turnStatus.innerHTML = `${p2Name} צדק! <i class="fa-solid fa-angles-down"></i> מתקדם.`;
                turnStatus.style.color = "var(--danger-red)";
                chaserPos++;
            } else {
                turnStatus.innerHTML = `${p2Name} טעה! <i class="fa-solid fa-shield-halved"></i> נשאר במקום.`;
                turnStatus.style.color = "var(--success-green)";
            }
            
            updateTokens();

            setTimeout(() => {
                checkGameState();
            }, 1500);

        }, 1500); 
    }

    function checkGameState() {
        if (chaserPos >= playerPos) {
            endGame(false, `הצ'ייסר ${p2Name} תפס אתכם! המשחק נגמר.`);
        } else if (playerPos >= TOTAL_STEPS) {
            endGame(true, `כל הכבוד ${p1Name}! הגעתם לבנק והבטחתם את מקומכם.`);
        } else {
            nextTurn(); 
        }
    }

    function endGame(isWin, message) {
        document.getElementById('game-screen').style.display = 'none';
        const endScreen = document.getElementById('end-screen');
        const title = document.getElementById('end-title');
        
        endScreen.style.display = 'block';
        document.getElementById('end-subtitle').innerHTML = message;

        if (isWin) {
            title.innerHTML = `<i class="fa-solid fa-trophy"></i> ניצחון!`;
            title.style.color = "var(--success-green)";
            playSound('correct'); 
        } else {
            title.innerHTML = `<i class="fa-solid fa-skull"></i> נתפסתם!`;
            title.style.color = "var(--danger-red)";
            playSound('wrong'); 
        }
    }

    function use5050() {
        document.getElementById('ll-5050').disabled = true;

        const optionsDivs = document.querySelectorAll('.option-btn');
        
        (currentQuestion.shuffledOptions || []).forEach((opt, index) => {

        });

                let display = document.getElementById('display');

                function calculate() {
                    try { if(currentVal === '') return; let result = eval(currentVal); result = Math.round(result * 100000) / 100000; currentVal = result.toString(); updateDisplay(); } 
                    catch(e) { currentVal = 'שגיאה'; updateDisplay(); }
                }
                function updateDisplay() { let show = currentVal.replace(/\\*/g, '×').replace(/\\//g, '÷'); display.value = show || '0'; }
            <\/script>

    function containsHebrew(str) { return /[\u0590-\u05FF]/.test(str); }

    function formatContent(text) {
        if (text === null || text === undefined) return "";
        let html = Array.isArray(text) ? text.join('\n') : String(text);
        
        // Remove LaTeX delimiters \( and \) and $$
        html = html.replace(/\\\(/g, '').replace(/\\\)/g, '').replace(/\$\$/g, '');

        // Convert \dfrac{}{} or \frac{}{} to visual fraction
        html = html.replace(/\\d?frac\{([^}]+)\}\{([^}]+)\}/g, '<span class="fraction-container" dir="ltr"><span class="fraction-numerator">$1</span><span class="fraction-denominator">$2</span></span>');

        const svgs = [];
        html = html.replace(/<svg[\s\S]*?<\/svg>/gi, m => { svgs.push(m); return `⚿SVG⚿`; });
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/(^|[^א-ת])(\d+(?:\.\d+)?)-(?!\d)/g, '$1-$2');
        html = html.replace(/\*/g, '×'); 
        html = html.replace(/\^\(([^)]+)\)/g, '<sup>$1</sup>');
        html = html.replace(/\^([a-zA-Z0-9\.\-]+)/g, '<sup>$1</sup>');
        
        // Improve inline math elements handling to keep them naturally flowing with text
        html = html.replace(/<strong>(.*?)<\/strong>/g, function(match, content) {
            if (!/[\u0590-\u05FF]/.test(content)) return `<span class="math-bdi" dir="ltr">${content}</span>`;
            return match; 
        });
        
        const pMap = {'²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','⁰':'0','¹':'1'};
        html = html.replace(/[²³⁴⁵⁶⁷⁸⁹⁰¹]/g, m => `<sup>${pMap[m]}</sup>`);
        
        // תיקון שברים ישנים
        html = html.replace(/(^|[\s(=\><+\-*/×÷])(\d+)\/(\d+)(?=$|[\s)=\><+\-*/×÷])/g, '$1<span class="fraction-container" dir="ltr"><span class="fraction-numerator">$2</span><span class="fraction-denominator">$3</span></span>');
        
        html = html.trim();
        if (/[\?\.\!\)]$/.test(html)) { html += '&rlm;'; }
        html = html.replace(/⚿SVG⚿/g, () => svgs.shift());
        return html;
    }

    function shuffleOptions(options) {
        if (!options || !Array.isArray(options)) return [];
        let opts = options.map((opt, index) => ({ text: opt, originalIndex: index }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return opts;
    }

    function playSound(type) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.03, ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } else {
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(150, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3); 
                gain.gain.setValueAtTime(0.03, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            }
        } catch(e) {}
    }
