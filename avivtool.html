<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל דפי עבודה משודרג</title>
    <!-- טעינת עיצוב וספריות -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // אייקונים
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconWand = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4V2"></path><path d="M15 16v-2"></path><path d="M8 9h2"></path><path d="M20 9h2"></path><path d="M17.8 11.8L19 13"></path><path d="M15 9h0"></path><path d="M17.8 6.2L19 5"></path><path d="m3 21 9-9"></path><path d="M12.2 6.2L11 5"></path></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconCode = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;

        function App() {
            const [fileName, setFileName] = useState('MathWorksheet');
            const [pageTitle, setPageTitle] = useState('דף עבודה: בעיות מילוליות אתגריות');
            const [questions, setQuestions] = useState([
                { id: 1, title: 'שאלה 1: נושא השאלה', content: '', solution: '', finalAnswer: '' }
            ]);
            
            const [aiTopic, setAiTopic] = useState('שברים ואחוזים');
            const [aiCount, setAiCount] = useState(5);
            const [apiKey, setApiKey] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const addQuestion = () => {
                const newId = questions.length > 0 ? Math.max(...questions.map(q => q.id)) + 1 : 1;
                setQuestions([...questions, { id: newId, title: `שאלה ${newId}: `, content: '', solution: '', finalAnswer: '' }]);
            };

            const removeQuestion = (id) => {
                setQuestions(questions.filter(q => q.id !== id));
            };

            const updateQuestion = (id, field, value) => {
                setQuestions(questions.map(q => q.id === id ? { ...q, [field]: value } : q));
            };

            const generateHTMLCode = () => {
                return `<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${pageTitle}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .question-card { background-color: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 5px solid #3498db; }
        .question-title { font-size: 1.2em; font-weight: bold; color: #2980b9; margin-bottom: 10px; }
        .question-text { font-size: 1.1em; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        .toggle-btn { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; font-size: 1em; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; }
        .toggle-btn:hover { background-color: #27ae60; }
        .solution { display: none; margin-top: 15px; padding: 15px; background-color: #e8f8f5; border-radius: 5px; border: 1px solid #d1f2eb; line-height: 1.6; white-space: pre-wrap; }
        .final-answer { font-weight: bold; color: #c0392b; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; }
    </style>
</head>
<body>
    <h1>${pageTitle}</h1>

${questions.map((q) => `    <div class="question-card">
        <div class="question-title">${(q.title || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
        <div class="question-text">${(q.content || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
        <button class="toggle-btn" onclick="toggleSolution('sol${q.id}')">הצג פתרון מלא</button>
        <div id="sol${q.id}" class="solution">
            <div class="solution-steps">${(q.solution || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
            ${q.finalAnswer ? `<div class="final-answer">תשובה סופית: ${(q.finalAnswer || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>` : ''}
        </div>
    </div>`).join('\n')}

    <script>
        function toggleSolution(id) {
            var element = document.getElementById(id);
            if (element.style.display === "none" || element.style.display === "") {
                element.style.display = "block";
                element.previousElementSibling.innerText = "הסתר פתרון";
            } else {
                element.style.display = "none";
                element.previousElementSibling.innerText = "הצג פתרון מלא";
            }
        }
    <\/script>
</body>
</html>`;
            };

            const fetchQuestionsFromAI = async () => {
                if (!apiKey) {
                    alert('כדי להשתמש בייצור האוטומטי ישירות מהמחשב שלך, יש להזין מפתח API של Gemini בשדה המיועד (או למחוק שאלות ולהזין אותן ידנית).');
                    return;
                }
                if (aiCount > 30) {
                    alert('ניתן לייצר עד 30 שאלות בכל פעם מטעמי עומס.');
                    return;
                }
                
                setIsLoading(true);
                try {
                    const promptText = `ייצר ${aiCount} בעיות מילוליות במתמטיקה לרמת כיתות ה'-ו' בנושא: ${aiTopic}. 
                    החזר אך ורק מערך JSON של אובייקטים ללא שום טקסט מסביב וללא סימוני markdown.
                    לכל אובייקט יהיו בדיוק השדות הבאים: 
                    "title" (כותרת קצרה לשאלה), 
                    "content" (תוכן השאלה המלא), 
                    "solution" (דרך הפתרון מפורטת בשלבים), 
                    "finalAnswer" (התשובה הסופית בקצרה).`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            title: { type: "STRING" },
                                            content: { type: "STRING" },
                                            solution: { type: "STRING" },
                                            finalAnswer: { type: "STRING" }
                                        },
                                        required: ["title", "content", "solution", "finalAnswer"]
                                    }
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error('API Request Failed');
                    const data = await response.json();
                    const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (generatedText) {
                        const cleanedText = generatedText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                        const parsedQuestions = JSON.parse(cleanedText);
                        const baseId = questions.length > 0 ? Math.max(...questions.map(q => q.id)) : 0;
                        
                        const formattedQuestions = parsedQuestions.map((q, idx) => ({
                            id: baseId + idx + 1,
                            title: q.title || '',
                            content: q.content || '',
                            solution: q.solution || '',
                            finalAnswer: q.finalAnswer || ''
                        }));
                        
                        setQuestions(prev => [...prev, ...formattedQuestions]);
                        alert(`נוספו בהצלחה ${formattedQuestions.length} שאלות חדשות!`);
                    }
                } catch (error) {
                    console.error("Parse Error:", error);
                    alert('אירעה שגיאה ביצירת השאלות. ודא שמפתח ה-API תקין ונסה שוב.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDownload = () => {
                const code = generateHTMLCode();
                const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const finalFileName = fileName.endsWith('.html') ? fileName : `${fileName}.html`;
                link.download = finalFileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleCopy = () => {
                const code = generateHTMLCode();
                navigator.clipboard.writeText(code);
                alert('קוד ה-HTML הועתק ללוח!');
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 p-4 sm:p-6 pb-24">
                    
                    {/* Header */}
                    <div className="bg-white p-5 sm:p-6 rounded-xl shadow-sm border border-gray-200">
                        <h1 className="text-xl sm:text-2xl font-bold text-blue-600 flex items-center gap-2 mb-4">
                            <IconCode /> מחולל דפי עבודה (מקומי)
                        </h1>
                        <p className="text-gray-600 mb-6 text-sm sm:text-base">
                            הכלי פועל כעת ישירות מהדפדפן שלך! הכנס את פרטי הדף והשאלות, ולחץ על הורדה בסיום.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">שם הקובץ (באנגלית, ללא רווחים)</label>
                                <input type="text" value={fileName} onChange={(e) => setFileName(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="MathWorksheet" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">כותרת הדף המרכזית</label>
                                <input type="text" value={pageTitle} onChange={(e) => setPageTitle(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="דף עבודה: שברים ובעיות מילוליות" />
                            </div>
                        </div>
                    </div>

                    {/* AI Generation Box */}
                    <div className="bg-gradient-to-r from-purple-50 to-blue-50 p-5 sm:p-6 rounded-xl shadow-sm border border-purple-200">
                        <h2 className="text-lg font-bold text-purple-800 flex items-center gap-2 mb-4">
                            <IconWand /> ייצור שאלות אוטומטי (למתקדמים)
                        </h2>
                        <div className="flex flex-col md:flex-row gap-4 mb-4">
                            <div className="flex-1">
                                <label className="block text-sm font-medium text-purple-900 mb-1">נושא השאלות</label>
                                <input type="text" value={aiTopic} onChange={(e) => setAiTopic(e.target.value)} className="w-full p-2 border border-purple-300 rounded-md focus:ring-2 focus:ring-purple-500 outline-none bg-white" placeholder="למשל: חיבור שברים עשרוניים" />
                            </div>
                            <div className="w-full md:w-32">
                                <label className="block text-sm font-medium text-purple-900 mb-1">כמות שאלות</label>
                                <input type="number" min="1" max="30" value={aiCount} onChange={(e) => setAiCount(parseInt(e.target.value) || 1)} className="w-full p-2 border border-purple-300 rounded-md focus:ring-2 focus:ring-purple-500 outline-none bg-white md:text-center" />
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 items-end border-t border-purple-200 pt-4">
                            <div className="flex-1">
                                <label className="block text-xs font-medium text-purple-700 mb-1">כדי לייצר אוטומטית מקומית, הזן מפתח API של Gemini (לא חובה להזנה ידנית)</label>
                                <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full p-2 border border-purple-300 rounded-md focus:ring-2 focus:ring-purple-500 outline-none bg-white text-sm font-mono" />
                            </div>
                            <button onClick={fetchQuestionsFromAI} disabled={isLoading} className="w-full md:w-auto bg-purple-600 text-white px-6 py-2 h-[42px] rounded-md hover:bg-purple-700 transition-colors font-medium flex items-center justify-center gap-2 min-w-[140px] disabled:opacity-70">
                                {isLoading ? <IconLoader /> : 'ייצר שאלות'}
                            </button>
                        </div>
                    </div>

                    {/* Questions Editor */}
                    <div className="space-y-4">
                        <div className="flex justify-between items-center mb-2">
                            <h2 className="text-xl font-bold text-gray-700">עריכת שאלות ({questions.length})</h2>
                            <button onClick={() => setQuestions([])} className="text-sm text-red-500 hover:text-red-700 font-medium px-2 py-1 rounded bg-red-50 hover:bg-red-100 transition-colors">
                                נקה הכל
                            </button>
                        </div>
                        
                        {questions.map((q, index) => (
                            <div key={q.id} className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-200 relative">
                                <div className="flex flex-col space-y-4 pl-0 sm:pl-14">
                                    <div className="flex justify-between items-start sm:absolute sm:top-6 sm:left-6">
                                        <h3 className="font-bold text-gray-400 text-sm sm:hidden mb-2">שאלה {index + 1}</h3>
                                        <button onClick={() => removeQuestion(q.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-md transition-colors shadow-sm border border-red-100" title="מחק שאלה">
                                            <IconTrash />
                                        </button>
                                    </div>
                                    <div><label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">כותרת השאלה</label><input type="text" value={q.title || ''} onChange={(e) => updateQuestion(q.id, 'title', e.target.value)} className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-800" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">תוכן השאלה</label><textarea value={q.content || ''} onChange={(e) => updateQuestion(q.id, 'content', e.target.value)} className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none h-20 resize-y" /></div>
                                    <div><label className="block text-xs font-bold text-green-600 uppercase tracking-wider mb-1">דרך פתרון</label><textarea value={q.solution || ''} onChange={(e) => updateQuestion(q.id, 'solution', e.target.value)} className="w-full p-2 border border-green-300 bg-green-50 rounded-md focus:ring-2 focus:ring-green-500 outline-none h-24 resize-y" /></div>
                                    <div><label className="block text-xs font-bold text-red-500 uppercase tracking-wider mb-1">תשובה סופית</label><input type="text" value={q.finalAnswer || ''} onChange={(e) => updateQuestion(q.id, 'finalAnswer', e.target.value)} className="w-full p-2 border border-red-300 bg-red-50 rounded-md focus:ring-2 focus:ring-red-500 outline-none" /></div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={addQuestion} className="w-full py-4 border-2 border-dashed border-gray-300 text-gray-600 rounded-xl hover:bg-gray-50 hover:border-gray-400 transition-colors flex items-center justify-center gap-2 font-medium bg-white shadow-sm">
                        <IconPlus /> הוסף שאלה ידנית ריקה
                    </button>

                    {/* Action Buttons */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white p-4 border-t border-gray-200 flex flex-col sm:flex-row gap-4 justify-between items-center shadow-[0_-4px_6px_rgba(0,0,0,0.05)] z-50">
                        <p className="text-sm text-gray-500 hidden lg:block">לחץ על הורדה כדי לקבל את קובץ השאלות המוגמר שלך.</p>
                        <div className="flex gap-3 w-full lg:w-auto">
                            <button onClick={handleCopy} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium border border-gray-300">
                                <IconCopy /> העתק קוד
                            </button>
                            <button onClick={handleDownload} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-md shadow-blue-200">
                                <IconDownload /> הורד דף עבודה (.html)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
