<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מתמטיקה - המרכז להישגים לימודיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0f172a; --accent-color: #b09151; --bg-color: #fbfaf8; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        header { background: var(--primary-color); color: white; padding: 25px; text-align: center; }
        header h1 { font-size: 1.8rem; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .activity-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border-bottom: 5px solid var(--primary-color); }
        .activity-card:active { transform: scale(0.98); }
        .icon { font-size: 35px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 25px 25px 0 0; width: 100%; max-width: 500px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { float: left; cursor: pointer; font-size: 1.5rem; color: #94a3b8; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; margin-bottom: 20px; outline: none; background: #fff; font-family: 'Heebo'; }
        .btn-start { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        @media (min-width: 600px) { .modal-overlay { align-items: center; } .modal-content { border-radius: 20px; width: 90%; } }
    </style>
</head>
<body>

<header>
    <h1>מתמטיקה - בחירת פעילות</h1>
    <p id="grade-display">טוען...</p>
</header>

<div class="container">
    <a href="index.html" class="back-btn">← חזרה</a>
    <div class="activity-grid">
        <div class="activity-card" onclick="openSelectionModal('תרגול', true)">
            <div class="icon">📝</div>
            <h3>תרגול</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('בוחן', true)">
            <div class="icon">⏱️</div>
            <h3>בוחן</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('מבחן', false)">
            <div class="icon">🎓</div>
            <h3>מבחן</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('המיליונר', false)">
            <div class="icon">💰</div>
            <h3>המיליונר</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('ראש בראש', false)">
            <div class="icon">⚔️</div>
            <h3>ראש בראש</h3>
        </div>
    </div>
</div>

<div id="selection-modal" class="modal-overlay">
    <div class="modal-content" id="modal-inner-content"></div>
</div>

<script>
    const allMathData = {
        "35371": {
            "algebra371": { name: "אלגברה", subs: ["הוצאת גורם משותף", "נוסחאות הכפל המקוצר", "פירוק הטרינום הריבועי", "צמצום שברים אלגבריים", "כפל וחילוק שברים אלגבריים", "חיבור וחיסור שברים אלגבריים"] },
            "wordProblems371": { name: "בעיות גידול ודעיכה", subs: ["חישובי אחוזים", "נוסחת גידול ודעיכה - מציאת כמות סופית", "נוסחת גידול ודעיכה - מציאת כמות התחלתית", "נוסחת גידול ודעיכה - מציאת שיעור השינוי (q)", "נוסחת גידול ודעיכה - מציאת זמן"] },
            "probability371": { name: "הסתברות", subs: ["הסתברות קלאסית", "דיאגרמת עץ", "הסתברות מותנית", "נוסחת ברנולי", "מאורעות בלתי תלויים"] },
            "algebraTech371": { name: "טכניקה אלגברית", subs: ["משוואות ממעלה ראשונה", "משוואות ריבועיות", "משוואות עם שברים אלגבריים", "משוואות מיוחדות"] },
            "trigPlane371": { name: "טריגונומטריה במישור", subs: ["משולש ישר זווית", "משולש שווה שוקיים", "משולש כללי", "מרובעים"] },
            "trigSpace371": { name: "טריגונומטריה במרחב", subs: ["תיבה וקוביה", "מנסרה ישרה", "פירמידה ישרה"] },
            "systems371": { name: "מערכת משוואות", subs: ["הצבה", "השוואת מקדמים", "שברים"] },
            "inequalities371": { name: "משוואות ואי שוויונות", subs: ["מעלה ראשונה", "מעלה שנייה", "פתרון גרפי"] },
            "quadraticEq371": { name: "משוואות ממעלה שנייה ויותר", subs: ["ריבועיות מלאות", "דו-ריבועיות", "שברים מורכבים"] },
            "sequences371": { name: "סדרות", subs: ["חשבונית", "הנדסית", "מעורבות"] },
            "stats371": { name: "סטטיסטיקה והסתברות", subs: ["מדדי מרכז", "סטיית תקן", "התפלגות נורמלית"] },
            "graphs371": { name: "קריאת גרפים", subs: ["פונקציה קווית", "פונקציה ריבועית", "חיתוך גרפים"] },
            "linearProg371": { name: "תכנון ליניארי", subs: ["מערכת אילוצים", "פונקציית מטרה", "פתרון אופטימלי"] },
            "finalExams371": { name: "תרגול בחינות בגרות", subs: ["שנים קודמות", "מבחני מתכונת", "שאלות בגרות לפי נושאים"] }
        },
        "35372": {
            "wordProblems372": { name: "בעיות מילוליות", subs: ["בעיות גיאומטריות", "בעיות קנייה ומכירה", "בעיות תנועה"] },
            "analytic372": { name: "גיאומטריה אנליטית", subs: ["אמצע קטע", "הישר", "המעגל", "מרחק בין נקודות", "משוואת הישר", "תרגילים מסכמים"] },
            "functionBehavior372": { name: "התנהגות פונקציות", subs: ["פונקציה עם x במכנה", "הופכית מעלה ראשונה", "הופכית מעלה שנייה", "לפי גרף"] },
            "integrals372": { name: "חשבון אינטגרלי", subs: ["האינטגרל המסוים", "חישוב שטחים", "פונקציה קדומה"] },
            "differential372": { name: "חשבון דיפרנציאלי", subs: ["בעיות קיצון פולינום", "קיצון שורש ומנה", "חקירה פולינום", "נגזרות ויישומים"] },
            "finalExams372": { name: "תרגול בחינות בגרות", subs: ["בחינות בגרות", "מבחנים מסכמים"] }
        },
        "35172": {
            "algebra": { name: "אלגברה", subs: ["מערכת משוואות מעלה שנייה", "פירוק לגורמים", "שינוי נושא בנוסחה"] },
            "wordProblems": { name: "בעיות מילוליות", subs: ["בעיות אחוזים", "בעיות קנייה ומכירה"] },
            "geometryAnalytic": { name: "גיאומטריה אנליטית", subs: ["אמצע קטע", "מרחק בין נקודות", "משוואת הישר", "קריאת גרפים"] },
            "realGraphs": { name: "גרפים מציאותיים", subs: ["קריאת מידע"] },
            "probability": { name: "הסתברות", subs: ["הסתברות", "טבלה דו מימדית", "דו שלביים"] },
            "trigonometry": { name: "טריגונומטריה", subs: ["ישר זווית", "מלבן", "מעוין", "משולש כללי", "שווה שוקיים"] },
            "sequences": { name: "סדרה חשבונית", subs: ["בעיות מציאותיות", "איבר כללי", "סכום סדרה"] },
            "stats": { name: "סטטיסטיקה והסתברות", subs: ["ממוצע וחציון", "שכיחות יחסית"] },
            "quadratic": { name: "פונקציה ריבועית", subs: ["פרבולה - מאפיינים", "פתרון אלגברי וגרפי"] },
            "finalExams": { name: "🏆 תרגול בחינות בגרות", subs: ["תרגול מבחנים מסכמים"] }
        },
        "ה-ו": {
            "percents": { name: "אחוזים", subs: ["חישוב ערך האחוז וחישוב האחוז", "מבוא"] },
            "verbal_problems": { name: "בעיות מילוליות", subs: ["בעיות הספק", "בעיות רב שלביות", "בעיות תנועה"] },
            "geometry": { name: "גיאומטריה", subs: ["היקפים ושטחים", "הכרת הגופים", "חישובי נפחים", "מעגל ועיגול"] },
            "dataAnalysis": { name: "חקר נתונים וסיכויים", subs: ["חקר נתונים", "ניתוח סיכויים"] },
            "ratio": { name: "יחס", subs: ["הגדרה ותכונות", "חלוקה לפי יחס", "קנה מידה"] },
            "decimals": { name: "מידות עשרוניות", subs: ["יחידות אורך", "יחידות משקל", "שטח ונפח"] },
            "fractions": { name: "שברים", subs: ["חיבור וחיסור", "חילוק", "חלק מכמות", "כפל", "מעבר לעשרוני", "צמצום והרחבה"] },
            "finalReviews": { name: "תרגול ומבחנים מסכמים", subs: ["לקראת כיתה ו'", "מבדק מחצית שנה"] }
        },
        "ז": {
            "wordProblemsZ": { name: "בעיות מילוליות", subs: ["אחוזים", "מספרים", "מילוי והרקה", "קנייה ומכירה", "תנועה"] },
            "geometryZ": { name: "גאומטריה", subs: ["עיגול", "מנסרה", "תיבה"] },
            "graphsZ": { name: "גרפים מציאותיים", subs: ["קריאת מידע"] },
            "triangleZ": { name: "המשולש", subs: ["היקף ושטח", "זוויות"] },
            "anglesZ": { name: "זוויות", subs: ["מתחלפות ומתאימות", "צמודות", "קודקודיות"] },
            "arithmeticZ": { name: "חוקי החשבון", subs: ["חילוף וקיבוץ", "הפילוג", "סדר פעולות"] },
            "powersZ": { name: "חזקות ושורשים", subs: ["חוקי חזקות", "שורש ריבועי"] },
            "signedNumbersZ": { name: "מספרים מכוונים", subs: ["חיבור וחיסור", "כפל וחילוק", "מערכת צירים", "ערך מוחלט"] },
            "quadrilateralsZ": { name: "מרובעים", subs: ["טרפז", "מלבן", "מקבילית", "ריבוע"] },
            "algebraZ": { name: "אלגברה", subs: ["כינוס איברים", "הצבה", "חוקיות"] },
            "functionsZ": { name: "פונקציות", subs: ["מושג הפונקציה", "ייצוגים", "עלייה וירידה"] }
        },
        "ח": {
            "percentsH": { name: "אחוזים", subs: ["התייקרות והוזלה", "חישובי אחוזים"] },
            "wordProblemsH": { name: "בעיות מילוליות", subs: ["גיאומטריות", "כלליות", "קנייה ומכירה", "תנועה"] },
            "triangleH": { name: "משולש", subs: ["חפיפה", "דמיון", "תיכון", "זוויות"] },
            "pythagorasH": { name: "משפט פיתגורס", subs: ["יתר", "ניצב", "יישומים"] },
            "geometry3DH": { name: "נפח ושטח פנים", subs: ["תיבה", "גליל", "מנסרה", "פירמידה"] },
            "factoringH": { name: "פירוק לגורמים", subs: ["גורם משותף", "כפל מקוצר"] },
            "systemsH": { name: "מערכת משוואות", subs: ["הצבה", "השוואת מקדמים", "גרפי"] },
            "linearFuncH": { name: "פונקציה קווית", subs: ["שיפוע", "משוואת ישר", "חיתוך"] }
        },
        "ט": {
            "algebraTech": { name: "טכניקה אלגברית", subs: ["גורם משותף", "כפל מקוצר", "טרינום", "שברים"] },
            "equations": { name: "משוואות", subs: ["מעלה ראשונה", "נוסחת השורשים", "שברים אלגבריים"] },
            "systems": { name: "מערכת משוואות", subs: ["שני נעלמים", "קו ופרבולה"] },
            "wordProblems": { name: "בעיות מילוליות", subs: ["תנועה", "הספק", "קנייה ומכירה", "אחוזים"] },
            "quadraticFunc": { name: "פונקציה ריבועית", subs: ["הפרבולה", "קודקוד", "עלייה וירידה", "חיוביות ושליליות"] },
            "geometry": { name: "גאומטריה", subs: ["מרובעים", "דמיון", "פיתגורס", "קטע אמצעים"] },
            "trigonometry": { name: "טריגונומטריה", subs: ["סינוס קוסינוס טנגנס", "חישוב צלעות וזוויות"] },
            "finalReview": { name: "תרגול מסכם", subs: ["מבחני מפמ\"ר", "מסכם ט'", "חזרה ל-י'"] }
        }
    };

    let currentActivity = "";
    let needsSubtopic = false;
    const urlParams = new URLSearchParams(window.location.search);
    const grade = urlParams.get('grade'); 
    
    document.getElementById('grade-display').innerText = grade ? (grade === "35371" ? "שאלון 371" : (grade === "35372" ? "שאלון 372" : (grade === "35172" ? "שאלון 172" : `כיתה ${grade}`))) : "בחירת פעילות";

    function openSelectionModal(activityName, subtopicRequired) {
        currentActivity = activityName;
        needsSubtopic = subtopicRequired;
        const inner = document.getElementById('modal-inner-content');
        if (!grade || !allMathData[grade]) {
            inner.innerHTML = `<span class="close-modal" onclick="closeModal()">✕</span><h2>שגיאה</h2><p>לא נבחרה כיתה תקינה.</p>`;
        } else {
            let topicOptions = '<option value="">-- בחר נושא --</option>';
            for (let key in allMathData[grade]) { topicOptions += `<option value="${key}">${allMathData[grade][key].name}</option>`; }
            inner.innerHTML = `<span class="close-modal" onclick="closeModal()">✕</span><h2>${activityName}</h2><select id="topic-select" onchange="updateSubtopics()">${topicOptions}</select><div id="subtopic-container" style="display:none;"><select id="subtopic-select"></select></div><button class="btn-start" onclick="handleStart()">התחל</button>`;
        }
        document.getElementById('selection-modal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('selection-modal').style.display = 'none'; }
    
    function updateSubtopics() {
        const topicKey = document.getElementById('topic-select').value;
        const container = document.getElementById('subtopic-container');
        const select = document.getElementById('subtopic-select');
        if (needsSubtopic && topicKey && allMathData[grade][topicKey] && allMathData[grade][topicKey].subs.length > 0) {
            select.innerHTML = '<option value="">-- בחר תת נושא --</option>';
            allMathData[grade][topicKey].subs.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.text = s; select.appendChild(opt); });
            container.style.display = 'block';
        } else { container.style.display = 'none'; }
    }

    function handleStart() {
        const t = document.getElementById('topic-select');
        const s = document.getElementById('subtopic-select');
        if (!t.value) { alert("אנא בחר נושא"); return; }
        const hasSubs = allMathData[grade][t.value] && allMathData[grade][t.value].subs.length > 0;
        if (needsSubtopic && hasSubs && !s.value) { alert("אנא בחר תת נושא"); return; }

        if (currentActivity === 'תרגול') {
            window.location.href = `practice.html?grade=${encodeURIComponent(grade)}&topic=${encodeURIComponent(t.value)}&subtopic=${encodeURIComponent(s.value)}&activity=${encodeURIComponent(currentActivity)}`;
            return;
        }
        alert(`מתחיל ${currentActivity}... בהצלחה!`);
        closeModal();
    }
</script>
</body>
</html>
