<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0f172a; --accent-color: #b09151; --bg-color: #fbfaf8; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        header { background: var(--primary-color); color: white; padding: 25px; text-align: center; }
        header h1 { font-size: 1.8rem; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .activity-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border-bottom: 5px solid var(--primary-color); }
        .activity-card:active { transform: scale(0.98); }
        .icon { font-size: 35px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 25px 25px 0 0; width: 100%; max-width: 500px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { float: left; cursor: pointer; font-size: 1.5rem; color: #94a3b8; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; margin-bottom: 20px; outline: none; background: #fff; font-family: 'Heebo'; }
        .btn-start { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        @media (min-width: 600px) { .modal-overlay { align-items: center; } .modal-content { border-radius: 20px; width: 90%; } }
    </style>
</head>

            "sequences571": { name: "סדרות", subs: ["סדרות חשבוניות והנדסיות (מתקדם)", "סדרה הנדסית אינסופית מתכנסת", "סדרה לפי כלל נסיגה", "מציאת סכומים מיוחדים", "אינדוקציה מתמטית (אם נכלל במיקוד)"] },
            "probability571": { name: "הסתברות", subs: ["עץ וטבלה", "הסתברות מותנית והפוכה (בייס)", "נוסחת ברנולי מורכבת", "קומבינטוריקה (עקרונות המנייה)", "הוצאה עם ובלי החזרה"] },
            "geometryEuclid571": { name: "גאומטריה אוקלידית", subs: ["פרופורציה ודמיון", "משפט תאלס וחוצה זווית", "משולשים מיוחדים ונקודות מפגש", "תכונות המעגל ברמה גבוהה", "מעגלים משיקים ונחתכים"] },
            "trigonometry571": { name: "טריגונומטריה", subs: ["פתרון משוואות עם זהויות מורכבות", "משפטי סינוס וקוסינוס מתקדמים", "רדיוס מעגל חוסם וחסום", "שילוב גאומטריה וטריגונומטריה במישור"] },
            "calculusDiff571": { name: "חשבון דיפרנציאלי (חדו\"א 1)", subs: ["פולינומים, רציונליות ושורש (כולל שורש במכנה)", "השקה ומשוואת משיק למקור", "אסימפטוטות אופקיות, אנכיות וחורים", "חקירה מלאה עם פרמטרים", "בעיות קיצון גיאומטריות מתקדמות"] },
            "calculusInt571": { name: "חשבון אינטגרלי (חדו\"א 1)", subs: ["אינטגרל פולינום, מנה ושורש", "שטח בין מספר פונקציות המוגדר בקטעים", "מציאת פונקציה קדומה על פי תנאי"] },
            "finalExams571": { name: "תרגול בחינות בגרות", subs: ["מבחני מתכונת קשים", "פתרון שאלונים 581/571"] }
        },
        "35572": {
            "analyticGeometry572": { name: "גאומטריה אנליטית", subs: ["משוואת הישר והמעגל", "פרבולה - הגדרה ומשיקים", "אליפסה קנונית - הגדרה ותכונות", "מקומות גיאומטריים מורכבים"] },
            "vectors572": { name: "וקטורים", subs: ["וקטור גיאומטרי (קומבינציה ליניארית)", "וקטור אלגברי ופעולות", "הצגה פרמטרית של ישר ומישור", "מצבים הדדיים במרחב", "זווית בין ישרים ומישורים", "מרחק נקודה מישר וממישור"] },
            "complexNumbers572": { name: "מספרים מרוכבים", subs: ["פעולות באלגברה מרוכבת", "הצגה טריגונומטרית (קוטבית)", "משפט דה-מואבר", "מציאת שורשים במישור של גאוס", "משוואות מרוכבות וקודקודים מצולע משוכלל"] },
            "trigSpace572": { name: "טריגונומטריה במרחב", subs: ["תיבה ופירמידה", "מנסרות משוכללות", "זווית בין מישורים", "כדורים חוסמים וחסומים במרחב"] },
            "calculusExpLog572": { name: "חדו\"א - מעריכיות ולוגריתמיות", subs: ["נגזרות של e^x ו-a^x", "נגזרות של ln(x) ו-log(x)", "פונקציות חזקה f(x)^g(x)", "חקירה מלאה עם פרמטרים", "חקירת פונקציית נגזרת f'(x)"] },
            "calculusInt572": { name: "אינטגרלים מתקדמים", subs: ["אינטגרל מעריכי ולוגריתמי", "שיטת ההצבה", "אינטגרציה בחלקים (אם במיקוד)", "נפח גוף סיבוב"] },
            "growthDecay572": { name: "בעיות גדילה ודעיכה", subs: ["מודל המעריכי ברמה גבוהה", "משוואות דיפרנציאליות בסיסיות (y'=ky)"] },
            "finalExams572": { name: "תרגול בחינות בגרות", subs: ["מבחני מתכונת מתקדמים", "פתרון שאלונים 582/572"] }
        }
    };

    let currentActivity = "";
    let needsSubtopic = false;
    const urlParams = new URLSearchParams(window.location.search);
    const grade = urlParams.get('grade'); 
    
    // עדכון תצוגת הכותרת לפי שם השאלון התקני
    let displayTitle = "בחירת פעילות";
    if (grade) {
        if (grade === "35172") displayTitle = "שאלון 172 (3 יח\"ל)";
        else if (grade === "35371") displayTitle = "שאלון 371 (3 יח\"ל)";
        else if (grade === "35372") displayTitle = "שאלון 372 (3 יח\"ל)";
        else if (grade === "35471") displayTitle = "שאלון 471 (4 יח\"ל)";
        else if (grade === "35472") displayTitle = "שאלון 472 (4 יח\"ל)";
        else if (grade === "35571") displayTitle = "שאלון 571 (5 יח\"ל)";
        else if (grade === "35572") displayTitle = "שאלון 572 (5 יח\"ל)";
        else displayTitle = `כיתה ${grade}`;
    }
    document.getElementById('grade-display').innerText = displayTitle;

    function openSelectionModal(activityName, subtopicRequired) {
        currentActivity = activityName;
        needsSubtopic = subtopicRequired;
        const inner = document.getElementById('modal-inner-content');
        if (!grade || !allMathData[grade]) {
            inner.innerHTML = `<span class="close-modal" onclick="closeModal()">✕</span><h2>שגיאה</h2><p>לא נבחרה כיתה תקינה או שהשאלון אינו קיים במערכת.</p>`;
        } else {
            let topicOptions = '<option value="">-- בחר נושא --</option>';
            for (let key in allMathData[grade]) { 
                topicOptions += `<option value="${key}">${allMathData[grade][key].name}</option>`; 
            }
            inner.innerHTML = `<span class="close-modal" onclick="closeModal()">✕</span><h2>${activityName}</h2><select id="topic-select" onchange="updateSubtopics()">${topicOptions}</select><div id="subtopic-container" style="display:none;"><select id="subtopic-select"></select></div><button class="btn-start" onclick="handleStart()">התחל</button>`;
        }
        document.getElementById('selection-modal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('selection-modal').style.display = 'none'; }
    
    function updateSubtopics() {
        const topicKey = document.getElementById('topic-select').value;
        const container = document.getElementById('subtopic-container');
        const select = document.getElementById('subtopic-select');
        if (needsSubtopic && topicKey && allMathData[grade][topicKey] && allMathData[grade][topicKey].subs.length > 0) {
            select.innerHTML = '<option value="">-- בחר תת נושא --</option>';
            allMathData[grade][topicKey].subs.forEach(s => { 
                const opt = document.createElement('option'); 
                opt.value = s; 
                opt.text = s; 
                select.appendChild(opt); 
            });
            container.style.display = 'block';
        } else { 
            container.style.display = 'none'; 
        }
    }

    function handleStart() {
        const t = document.getElementById('topic-select');
        const s = document.getElementById('subtopic-select');
        if (!t.value) { alert("אנא בחר נושא"); return; }
        const hasSubs = allMathData[grade][t.value] && allMathData[grade][t.value].subs.length > 0;
        if (needsSubtopic && hasSubs && !s.value) { alert("אנא בחר תת נושא"); return; }

        if (currentActivity === 'תרגול') {
            window.location.href = `practice.html?grade=${encodeURIComponent(grade)}&topic=${encodeURIComponent(t.value)}&subtopic=${encodeURIComponent(s.value)}&activity=${encodeURIComponent(currentActivity)}`;
            return;
        }
        alert(`מתחיל ${currentActivity}... בהצלחה!`);
        closeModal();
    }
</script>
