<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>חינוך פיננסי - המרכז להישגים לימודיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* צבע עליון - שחור יוקרתי עם נגיעות זהב */
            --primary-header: #000000;  
            --accent-gold: #c5a059;   
            --primary-blue: #0f172a;  
            
            --bg-color: #f8fafc;      
            --surface-color: #ffffff; 
            
            /* --- התיקון: הטקסט הראשי שונה ללבן כדי לבלוט על הרקע הכהה --- */
            --text-main: #f8fafc;     
            
            --text-muted: #94a3b8;    
            --border-soft: #334155;
            
            --btn-cream: #ffffff;
            --finance-color: #10b981; 
            
            --shadow-card: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 15px 35px -5px rgba(197, 160, 89, 0.2);
        }
        
        /* --- מניעת זום בלחיצה כפולה והתאמה למגע (טאצ') מוחלטת --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            touch-action: manipulation;
        }

        /* מניעת בחירת טקסט מקרית על כפתורים וכרטיסיות */
        button, a, .activity-card, .close-modal, .checkbox-item {
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* מניעת זום אוטומטי באייפון בעת לחיצה על שדות טקסט ובחירה */
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], input[type="number"], select, textarea, input[type="checkbox"] {
            font-size: 16px !important; 
            user-select: auto;
            -webkit-user-select: auto;
        }
        
        body { 
            font-family: 'Heebo', sans-serif; 
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            line-height: 1.4;
            background: linear-gradient(135deg, #0f172a 0%, #172033 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            touch-action: pan-y;
        }

        /* --- הדר עליון (לבן בלבד) עם פס זהב כגבול תחתון --- */
        header { 
            background: #ffffff; 
            padding: 15px 30px 15px 30px; 
            border-bottom: 2px solid var(--accent-gold); 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            text-align: center;
        }
        
        header h1 { color: var(--primary-header); font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: 0px; white-space: nowrap; line-height: 1.1;}
        #grade-display { color: #64748b; font-size: 0.95rem; font-weight: 500; margin: 5px 0 0 0; letter-spacing: 2px; text-transform: uppercase;}

        /* רקע צף ללימודים */
        #floating-container { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; overflow: hidden; pointer-events: none; 
        }
        .floating-icon { 
            position: absolute; 
            font-size: 3rem; 
            color: #ffffff; 
            opacity: 0.02; 
            animation: floatDiagonal infinite linear; 
            font-family: times new roman, serif; 
            font-style: italic;
        }
        @keyframes floatDiagonal { 
            0% { transform: translate(0, 0) rotate(0deg); } 
            100% { transform: translate(150px, -150px) rotate(360deg); } 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 30px 20px 50px 20px; 
            flex: 1; 
            width: 100%; 
            box-sizing: border-box; 
            position: relative; 
            z-index: 5;
        }

        .back-btn { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: all 0.2s ease; 
            background: rgba(255,255,255,0.05); 
            padding: 8px 16px; 
            border-radius: 8px; 
            border: 1px solid var(--border-soft);
        }
        .back-btn:hover { color: var(--accent-gold); border-color: var(--accent-gold); background: rgba(197, 160, 89, 0.1); transform: translateX(3px);}

        .section-title { font-size: 1.4rem; color: var(--accent-gold); margin: 20px 0 15px 0; border-bottom: 2px dashed var(--border-soft); padding-bottom: 5px; font-weight: 800; }

        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .activity-card { 
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px; 
            padding: 25px 15px; 
            text-align: center; 
            box-shadow: var(--shadow-card), inset 0 -5px 15px rgba(0,0,0,0.2); 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border: 1px solid var(--border-soft); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            position: relative;
        }
        
        .activity-card:hover { 
            box-shadow: var(--shadow-hover); 
            border-color: var(--accent-gold); 
            transform: translateY(-4px); 
        }
        .activity-card:active { transform: translateY(1px); }
        
        .icon { font-size: 45px; margin-bottom: 15px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        
        /* שינוי צבע הכותרת בתוך הכרטיסיות ללבן כדי שיראו טוב על כחול */
        .activity-card h3 { margin: 0; font-weight: 800; font-size: 1.25rem; color: var(--text-main); }
        
        /* כרטיסיות משחק/מיוחדות */
        .game-card { border-color: var(--finance-color); }
        .game-card:hover { border-color: #34d399; box-shadow: 0 15px 35px -5px rgba(16, 185, 129, 0.2); }

        /* מודאל בחירת הנושאים (חלון לבן קופץ) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        
        .modal-content { 
            background: #ffffff; 
            padding: 30px 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            box-sizing: border-box; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 2px solid var(--accent-gold); 
            max-height: 90vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .modal-content h2 { margin-top: 0; color: #0f172a; font-size: 1.6rem; margin-bottom: 20px; text-align: center; flex-shrink: 0; font-weight: 900;}
        
        #modal-inner-content {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
            padding-right: 5px;
        }

        .close-modal { position: absolute; left: 20px; top: 20px; cursor: pointer; font-size: 1.5rem; color: #94a3b8; font-weight: bold; line-height: 1; width:30px; height:30px; display:flex; align-items:center; justify-content:center; background:#f1f5f9; border-radius:50%;}
        .close-modal:hover { color: #fff; background: #ef4444; }
        
        select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 15px; outline: none; background: #f8fafc; font-family: 'Heebo'; font-weight: 600; color: #0f172a; cursor: pointer; flex-shrink: 0;}
        select:focus { border-color: var(--accent-gold); background: white; box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.15);}
        
        .checkbox-list { 
            display: flex; flex-direction: column; gap: 8px; 
            border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; 
            background: #f8fafc; margin-bottom: 20px; flex: 1; min-height: 150px;
        }
        
        .checkbox-item { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; color: #0f172a; font-weight: 600; cursor: pointer; padding: 4px 0; }
        .checkbox-item input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-gold); flex-shrink: 0;}
        
        .btn-start { 
            background: var(--accent-gold); color: #000; border: none; padding: 14px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; 
            font-size: 1.15rem; transition: 0.3s; margin-top: auto; 
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3); flex-shrink: 0;
            margin-top: 15px;
            font-family: 'Heebo', sans-serif;
        }
        .btn-start:hover { background: #b08d4b; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(197, 160, 89, 0.4); }
        
        .copyright-footer { text-align: center; font-size: 0.85rem; color: var(--text-muted); padding: 20px; margin-top: auto; z-index: 5; position: relative;}

        /* עיצוב גלילה למודאל */
        #modal-inner-content::-webkit-scrollbar, .checkbox-list::-webkit-scrollbar { width: 6px; }
        #modal-inner-content::-webkit-scrollbar-track, .checkbox-list::-webkit-scrollbar-track { background: transparent; }
        #modal-inner-content::-webkit-scrollbar-thumb, .checkbox-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #modal-inner-content::-webkit-scrollbar-thumb:hover, .checkbox-list::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        /* --- התאמה של 100% לסלולר וטאבלט --- */
        @media (max-width: 1024px) {
            .container { padding: 20px 15px; }
        }

        @media (max-width: 768px) {
            header { padding: 15px; }
            header h1 { font-size: 1.8rem; white-space: normal; line-height: 1.2; }
            #grade-display { font-size: 0.85rem; }
            .activity-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .section-title { font-size: 1.2rem; }
        }

        @media (max-width: 600px) { 
            .activity-grid { grid-template-columns: 1fr 1fr; gap: 15px; } 
            .activity-card { padding: 20px 10px; border-radius: 16px;} 
            .icon { font-size: 35px; } 
            .activity-card h3 { font-size: 1.1rem; } 
            
            .modal-content { padding: 25px 20px; width: 95%; border-radius: 16px; } 
            .modal-content h2 { font-size: 1.4rem; margin-bottom: 15px; }
            
            select { padding: 12px; font-size: 1rem; }
            .checkbox-item { font-size: 1rem; }
            .btn-start { padding: 12px; font-size: 1.1rem; margin-top: 15px; }
        }

        @media (max-width: 380px) {
            .activity-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="floating-container"></div>

<header>
    <h1>חינוך פיננסי - Financial Education</h1>
    <p id="grade-display">בחירת פעילות</p>
</header>

<div class="container">
    <a href="tirgul.html" class="back-btn">חזרה לתפריט הראשי ↩</a>
    
    <div class="section-title">למידה שוטפת ומבחנים</div>
    <div class="activity-grid">
        <div class="activity-card" onclick="openSelectionModal('תרגול', true)">
            <div class="icon">📝</div><h3>תרגול</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('בוחן', true)">
            <div class="icon">⏱️</div><h3>בוחן</h3>
        </div>
        <div class="activity-card" onclick="openSelectionModal('מבחן', false)">
            <div class="icon">🎓</div><h3>מבחן</h3>
        </div>
    </div>

    <div class="section-title">למידה משחקית חברתית</div>
    <div class="activity-grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
        <div class="activity-card game-card" onclick="openSelectionModal('המרדף', true)">
            <div class="icon">🏃‍♂️</div><h3>המרדף</h3>
        </div>
        <div class="activity-card game-card" onclick="openSelectionModal('ראש בראש', true)">
            <div class="icon">⚔️</div><h3>ראש בראש</h3>
        </div>
    </div>
</div>

<div id="selection-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <h2 id="modal-title"></h2>
        <div id="modal-inner-content"></div>
    </div>
</div>

<div class="copyright-footer">© כל הזכויות שמורות למרכז להישגים לימודיים</div>

<script>
    // יצירת אייקונים מרחפים לרקע (פיננסיים)
    function createFloatingIcons() {
        const container = document.getElementById('floating-container');
        if(!container) return;
        const icons = ['₪', '$', '€', '%', '📈', '📊', 'Bank', 'Tax'];
        for (let i = 0; i < 20; i++) {
            const iconSpan = document.createElement('span');
            iconSpan.className = 'floating-icon';
            iconSpan.innerText = icons[Math.floor(Math.random() * icons.length)];
            iconSpan.style.left = Math.random() * 100 + 'vw';
            iconSpan.style.top = Math.random() * 100 + 'vh';
            iconSpan.style.animationDuration = Math.random() * 30 + 40 + 's';
            container.appendChild(iconSpan);
        }
    }
    createFloatingIcons();

    // =========================================================================================
    // תוכנית הלימודים המעודכנת - חינוך פיננסי
    // =========================================================================================
    const financeData = {
        "budget_consumerism": { 
            name: "ניהול תקציב וצרכנות נבונה", 
            subs: [
                "בניית תקציב אישי ומשפחתי", 
                "מעקב אחר הכנסות והוצאות", 
                "השפעת הפרסום ופסיכולוגיה צרכנית", 
                "זכויות הצרכן וחוק הגנת הצרכן", 
                "קניות ברשת והשוואת מחירים"
            ] 
        },
        "work_and_wages": { 
            name: "עולם העבודה וזכויות עובדים", 
            subs: [
                "זכויות בני נוער בעבודה", 
                "הכרת תלוש השכר (ברוטו מול נטו)", 
                "מיסים: מס הכנסה, ביטוח לאומי ומס בריאות", 
                "פנסיה וחיסכון ארוך טווח"
            ] 
        },
        "banking_and_credit": { 
            name: "בנקאות, אשראי והלוואות", 
            subs: [
                "ניהול חשבון בנק ואמצעי תשלום", 
                "כרטיסי אשראי וכרטיסי חיוב מיידי (דביט)", 
                "מסגרת אשראי ואוברדרפט (משיכת יתר)", 
                "ריבית, הצמדה ואינפלציה", 
                "הלוואות, משכנתאות ודירוג אשראי חברתי"
            ] 
        },
        "savings_investments": { 
            name: "חיסכון, השקעות ושוק ההון", 
            subs: [
                "חשיבות החיסכון וריבית דריבית", 
                "אפיקי חיסכון בנקאיים (פיקדונות)", 
                "מבוא לשוק ההון (מניות ואגרות חוב)", 
                "קופות גמל וקרנות השתלמות", 
                "סיכוי מול סיכון בהשקעות"
            ] 
        },
        "insurance_risks": { 
            name: "ביטוח וניהול סיכונים", 
            subs: [
                "מהו ביטוח ולמה הוא נחוץ?", 
                "ביטוח חובה מול ביטוח רשות", 
                "סוגי ביטוחים: בריאות, רכב, דירה וחיים", 
                "קרן חירום והתמודדות עם משברים כלכליים"
            ] 
        },
        "digital_economy": { 
            name: "כלכלה דיגיטלית וזהירות פיננסית", 
            subs: [
                "ארנקים דיגיטליים ואפליקציות תשלום", 
                "זיהוי ומניעת הונאות רשת ועוקץ פיננסי", 
                "שמירה על פרטיות ומידע פיננסי אישי", 
                "מטבעות וירטואליים (קריפטו) - מושגי יסוד וסיכונים"
            ] 
        }
    };

    let currentActivity = "", needsSubtopic = false;
    
    function openSelectionModal(activityName, subtopicRequired) {
        currentActivity = activityName;
        needsSubtopic = subtopicRequired;
        const title = document.getElementById('modal-title');
        const inner = document.getElementById('modal-inner-content');
        
        title.innerText = activityName;
        
        let btnText = "התחל למידה";
        if (activityName === "תרגול") btnText = "התחל תרגול";
        else if (activityName === "בוחן") btnText = "התחל בוחן";
        else if (activityName === "מבחן") btnText = "התחל מבחן";
        else if (activityName === "המרדף" || activityName === "ראש בראש") btnText = "התחל משחק";

        let html = '';

        if (activityName === 'מבחן') {
            html += `<div style="font-weight:800; margin-bottom:10px; font-size:1.05rem; color:#0f172a; flex-shrink:0;">בחר נושאים למבחן:</div><div class="checkbox-list">`;
            for (let key in financeData) {
                html += `<label class="checkbox-item"><input type="checkbox" name="topic-check" value="${key}"> ${financeData[key].name}</label>`;
            }
            html += `</div><button class="btn-start" onclick="handleStart()">${btnText}</button>`;
        } else {
            let topicOptions = '<option value="">-- בחר נושא מרכזי --</option>';
            for (let key in financeData) { topicOptions += `<option value="${key}">${financeData[key].name}</option>`; }
            html += `<select id="topic-select" onchange="updateSubtopics()">${topicOptions}</select>`;
            html += `<div id="subtopic-container" style="display:none; flex: 1; min-height: 0; display: flex; flex-direction: column;"></div>`;
            html += `<button class="btn-start" onclick="handleStart()">${btnText}</button>`;
        }

        inner.innerHTML = html;
        document.getElementById('selection-modal').style.display = 'flex';
        
        if (activityName !== 'מבחן') {
            updateSubtopics();
        }
    }
    
    function closeModal() { document.getElementById('selection-modal').style.display = 'none'; }

    function updateSubtopics() {
        const tKey = document.getElementById('topic-select').value;
        const container = document.getElementById('subtopic-container');

        if (tKey && financeData[tKey]) {
            if (currentActivity === 'בוחן') {
                let checks = `<div style="font-weight:800; margin-bottom:8px; font-size:1.05rem; color:#0f172a; flex-shrink:0;">בחר תתי נושאים לבוחן:</div><div class="checkbox-list">`;
                financeData[tKey].subs.forEach(s => {
                    let safeVal = s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    checks += `<label class="checkbox-item"><input type="checkbox" name="subtopic-check" value='${safeVal}'> <span dir="rtl" style="text-align:left;">${s}</span></label>`;
                });
                checks += `</div>`;
                container.innerHTML = checks;
            } else {
                let sel = `<select id="subtopic-select" style="margin-bottom:0;"><option value="">-- בחר תת נושא --</option>`;
                financeData[tKey].subs.forEach(s => { 
                    let safeVal = s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    sel += `<option value='${safeVal}'>${s}</option>`; 
                });
                sel += `</select>`;
                container.innerHTML = sel;
            }
            container.style.display = 'flex';
        } else {
            container.style.display = 'none';
            container.innerHTML = '';
        }
    }

    function handleStart() {
        let topicParam = "", subtopicParam = "";

        if (currentActivity === 'מבחן') {
            const checkedTopics = document.querySelectorAll('input[name="topic-check"]:checked');
            if (checkedTopics.length === 0) { alert("יש לבחור לפחות נושא אחד למבחן"); return; }
            topicParam = Array.from(checkedTopics).map(cb => cb.value).join(",");
        } else {
            const t = document.getElementById('topic-select');
            if (!t || !t.value) { alert("אנא בחר נושא לפני ההתחלה"); return; }
            topicParam = t.value;
            
            // תנאי לכל פעילויות הבחירה היחידנית (כולל המשחקים)
            if (currentActivity === 'תרגול' || currentActivity === 'המרדף' || currentActivity === 'ראש בראש') {
                const s = document.getElementById('subtopic-select');
                if (!s || !s.value) { alert("חובה לבחור תת נושא כדי להתחיל"); return; }
                subtopicParam = s.value;
            } else if (currentActivity === 'בוחן') {
                const checkedSubs = document.querySelectorAll('input[name="subtopic-check"]:checked');
                if (checkedSubs.length === 0) { alert("חובה לבחור לפחות תת-נושא אחד לבוחן"); return; }
                subtopicParam = Array.from(checkedSubs).map(cb => cb.value).join(",");
            }
        }

        let targetFile = 'exam.html';
        if (currentActivity === 'תרגול') {
            targetFile = 'practice.html';
        } else if (currentActivity === 'המרדף') {
            targetFile = 'chase.html';
        } else if (currentActivity === 'ראש בראש') {
            targetFile = 'head2head.html';
        }

        // ניתוב למערכת הכללית עם Grade מוגדר כ-finance
        window.location.href = `${targetFile}?grade=finance&topic=${encodeURIComponent(topicParam)}&subtopic=${encodeURIComponent(subtopicParam)}&activity=${encodeURIComponent(currentActivity)}`;
    }
</script>
